[package]
name = "dialog-storage"
edition = "2024"
version.workspace = true
authors.workspace = true
license.workspace = true

[features]
helpers = [
  "tempfile",
  "anyhow",
  "rand",
  "dialog-common/helpers",
  "dep:s3s",
  "dep:hyper",
  "dep:hyper-util",
  "dep:http-body-util",
  "dep:bytes",
  "dep:tokio-test",
  "dep:tower",
  "dep:tower-http",
]
# Enables the S3/R2-compatible storage backend
s3 = ["dep:dialog-remote-s3", "dep:reqwest", "dep:url", "dep:chrono"]
# Enables S3 list operations (ListObjectsV2) with XML parsing
s3-list = ["s3", "dep:quick-xml"]
# Enables UCAN-based authorization via external access service
ucan = ["s3", "dep:dialog-remote-ucan-s3", "dep:dialog-credentials"]
# Enables real S3/R2 integration tests (requires R2S3_* environment variables)
s3-integration-tests = ["s3-list", "helpers"]
# Enable integration tests (tests with service provisioning)
integration-tests = ["dialog-common/integration-tests"]
# Enable web integration tests
web-integration-tests = ["dialog-common/web-integration-tests"]

[dependencies]
dialog-capability = { workspace = true }
dialog-common = { workspace = true }
dialog-effects = { workspace = true }
dialog-varsig = { workspace = true }
signature = { workspace = true }

anyhow = { workspace = true, optional = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
base58 = { workspace = true }
base64 = { workspace = true }
blake3 = { workspace = true }
brotli = { workspace = true }
futures-util = { workspace = true }
hyper = { workspace = true, optional = true }
hyper-util = { workspace = true, features = ["server", "tokio", "service"], optional = true }
md5 = { workspace = true }
reqwest = { workspace = true, features = ["json"], optional = true }
dialog-credentials = { workspace = true, optional = true }
dialog-remote-ucan-s3 = { workspace = true, optional = true }
dialog-remote-s3 = { workspace = true, optional = true }
quick-xml = { workspace = true, features = ["serde", "serialize"], optional = true }
parking_lot = { workspace = true }
s3s = { workspace = true, optional = true }
sieve-cache = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_ipld_dagcbor = { workspace = true }
rand = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
url = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
url = { workspace = true }
pidlock = { workspace = true }
tempfile = { workspace = true, optional = true }
tokio = { workspace = true, features = ["sync", "fs", "macros", "rt", "net"] }
http-body-util = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
tokio-test = { workspace = true, optional = true }
tower = { workspace = true, optional = true }
tower-http = { workspace = true, features = ["cors"], optional = true }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
js-sys = { workspace = true }
rexie = { workspace = true }
wasm-bindgen = { workspace = true }
web-time = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
blake3 = { workspace = true }
dialog-common = { workspace = true, features = ["helpers"] }
ipld-core = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
rand = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
bytes = { workspace = true }
chrono = { workspace = true }
dialog-remote-s3 = { workspace = true }
clap = { workspace = true, features = ["derive"] }
s3s = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true, features = ["server", "tokio", "service"] }
http-body-util = { workspace = true }
serde_ipld_dagcbor = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = [
  "sync",
  "macros",
  "rt",
  "fs",
  "rt-multi-thread",
] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["cors"] }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dev-dependencies]
# getrandom = { workspace = true, features = ["wasm_js"] }
getrandom = { workspace = true, features = ["js"] }
wasm-bindgen-test = { workspace = true }

[[test]]
name = "s3_integration_tests"
path = "tests/s3_integration_tests/main.rs"
required-features = ["s3-integration-tests"]

[lints.rust]
# This cfg is used by the dialog_common::test proc macro for wasm inner tests
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(dialog_test_wasm_integration)"] }
